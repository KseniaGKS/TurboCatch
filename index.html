<!DOCTYPE html>
<html lang="ru-ru">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>TurboCatch</title>
    <!-- Подключаем мост ВК -->
    <script src="https://unpkg.com"></script>
    <style>
      /* Убираем все отступы и фиксируем фон */
      html, body {
        background: #1C0A3C;
        width: 100%;
        height: 100%;
        overflow: hidden;
        margin: 0;
        padding: 0;
      }
      #unity-canvas {
        width: 100%;
        height: 100%;
        background: #1C0A3C;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <!-- Используем относительные пути для GitHub Pages -->
    <script src="./Build/docs.loader.js"></script>
    <script>
      // Инициализируем ВК сразу
      if (typeof vkBridge !== 'undefined') {
        vkBridge.send("VKWebAppInit");
      }

      // Настройка Viewport для мобилок
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover';
      document.getElementsByTagName('head')[0].appendChild(meta);

      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "./Build/docs.data",
        frameworkUrl: "./Build/docs.framework.js",
        codeUrl: "./Build/docs.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "TurboCatch",
        productVersion: "1.0",
        // Эти настройки критичны для адаптивности кнопок
        matchWebGLToCanvasSize: true,
        devicePixelRatio: Math.min(window.devicePixelRatio, 2),
      }).then((unityInstance) => {
        console.log("Unity Loaded Successfully");
      }).catch((message) => {
        console.error("Unity Loading Error:", message);
      });
    </script>
  </body>
</html>
