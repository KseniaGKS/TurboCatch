<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | TurboCatch</title>
    <!-- Подключаем мост ВК -->
    <script src="https://unpkg.com"></script>
  </head>
  <!-- Ставим фиолетовый фон сразу на body -->
  <body style="text-align: center; padding: 0; border: 0; margin: 0; background: #1C0A3C; overflow: hidden; width: 100%; height: 100%;">
    
    <canvas id="unity-canvas" tabindex="-1" style="width: 100%; height: 100%; background: #1C0A3C"></canvas>
    
    <script src="Build/docs.loader.js"></script>
    <script>
      // 1. Инициализация ВК
      vkBridge.send("VKWebAppInit");

      // 2. Настройка мобильного вида
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        // Добавили viewport-fit=cover для челок
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes, viewport-fit=cover';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";
        document.body.style.textAlign = "left";
      }

      // 3. Запуск Unity
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/docs.data",
        frameworkUrl: "Build/docs.framework.js",
        codeUrl: "Build/docs.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "TurboCatch",
        productVersion: "1.0",
        // Обязательно включи эти две строки для четкости и размера:
        matchWebGLToCanvasSize: true, 
        devicePixelRatio: Math.min(window.devicePixelRatio, 2), 
      }).then((unityInstance) => {
        console.log("Unity Loaded");
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
