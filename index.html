<!DOCTYPE html>
<html lang="ru-ru">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TurboCatch</title>
    <!-- Подключаем библиотеку VK Bridge -->
    <script src="https://unpkg.com"></script>
    <style>
        /* Убираем все отступы и фиксируем фиолетовый фон */
        html, body {
            background: #1C0A3C;
            width: 100%;
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        /* Делаем канвас на весь экран */
        #unity-canvas {
            width: 100vw;
            height: 100vh;
            background: #1C0A3C;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script src="./Build/docs.loader.js"></script>
    <script>
        // 1. ПЕРВАЯ инициализация моста (сразу при открытии страницы)
        if (typeof vkBridge !== 'undefined') {
            vkBridge.send("VKWebAppInit")
                .then(data => console.log("VK Bridge Step 1: OK"))
                .catch(err => console.error("VK Bridge Step 1: Error", err));
        }

        const canvas = document.querySelector("#unity-canvas");

        createUnityInstance(canvas, {
            dataUrl: "./Build/docs.data",
            frameworkUrl: "./Build/docs.framework.js",
            codeUrl: "./Build/docs.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "TurboCatch",
            productVersion: "1.0",
            // Настройки для того, чтобы кнопки НЕ съезжали
            matchWebGLToCanvasSize: true, 
            devicePixelRatio: Math.min(window.devicePixelRatio, 2),
        }).then((unityInstance) => {
            console.log("Unity Loaded!");

            // 2. ВТОРАЯ инициализация и сигнал о готовности (когда движок загружен)
            if (typeof vkBridge !== 'undefined') {
                vkBridge.send("VKWebAppInit");
                // Важно: сообщаем ВК, что приложение полностью готово к показу
                vkBridge.send("VKWebAppReady");
                console.log("VK Bridge Step 2: Full Ready");
            }
        }).catch((message) => {
            alert("Ошибка загрузки игры: " + message);
        });
    </script>
</body>
</html>
