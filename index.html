<!DOCTYPE html>
<html lang="ru-ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TurboCatch</title>
    <script src="https://unpkg.com"></script>
    <style>
        html, body { background: #1C0A3C; width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; }
        #unity-canvas { width: 100%; height: 100%; background: #1C0A3C; display: block; }
    </style>
</head>
<body>
    <canvas id="unity-canvas"></canvas>

    <!-- Точка перед Build обязательна для GitHub Pages -->
    <script src="./Build/docs.loader.js"></script>
    <script>
        if (typeof vkBridge !== 'undefined') {
            vkBridge.send("VKWebAppInit");
        }

        createUnityInstance(document.querySelector("#unity-canvas"), {
            dataUrl: "./Build/docs.data",
            frameworkUrl: "./Build/docs.framework.js",
            codeUrl: "./Build/docs.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "TurboCatch",
            productVersion: "1.0",
            matchWebGLToCanvasSize: true,
            devicePixelRatio: Math.min(window.devicePixelRatio, 2),
        }).then((unityInstance) => {
            console.log("Ура! Загрузилось");
        }).catch((message) => {
            console.error("Ошибка загрузки:", message);
        });
    </script>
</body>
</html>
